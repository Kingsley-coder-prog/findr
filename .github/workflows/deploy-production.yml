name: Deploy Production

on:
  push:
    branches:
      - main

jobs:
  deploy-backend-production:
    name: Deploy Backend → Render Production
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render production deploy
        run: |
          curl -s -X POST "${{ secrets.RENDER_PRODUCTION_DEPLOY_HOOK }}" \
            -H "Content-Type: application/json"

  deploy-frontend-production:
    name: Deploy Frontend → Vercel Production
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: findr-frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment (production)
        run: |
          cd findr-frontend
          vercel pull --yes --environment=production \
            --token=${{ secrets.VERCEL_TOKEN }}

      - name: Install dependencies
        run: |
          cd findr-frontend
          npm install --legacy-peer-deps

      - name: Build frontend
        run: |
          cd findr-frontend
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (production)
        run: |
          cd findr-frontend
          vercel deploy --prebuilt --prod \
            --token=${{ secrets.VERCEL_TOKEN }}
