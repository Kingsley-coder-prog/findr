name: Check

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

jobs:
  build-check:
    name: Frontend Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: findr-frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd findr-frontend
          npm install --legacy-peer-deps

      - name: Build frontend
        run: |
          cd findr-frontend
          npm run build
