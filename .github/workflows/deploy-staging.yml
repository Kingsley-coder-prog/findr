name: Deploy Staging

on:
  push:
    branches:
      - develop

jobs:
  deploy-backend-staging:
    name: Deploy Backend → Render Staging
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render staging deploy
        run: |
          curl -s -X POST "${{ secrets.RENDER_STAGING_DEPLOY_HOOK }}" \
            -H "Content-Type: application/json"

  deploy-frontend-staging:
    name: Deploy Frontend → Vercel Preview
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: findr-frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment (preview)
        run: |
          cd findr-frontend
          vercel pull --yes --environment=preview \
            --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build frontend
        run: |
          cd findr-frontend
          vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (preview)
        run: |
          cd findr-frontend
          vercel deploy --prebuilt \
            --token=${{ secrets.VERCEL_TOKEN }}
