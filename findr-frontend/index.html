<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

  <!-- App meta -->
  <title>findr — discover places near you</title>
  <meta name="description" content="Find mosques, hospitals, ATMs, eateries and more near you — powered by AI." />
  <meta name="theme-color" content="#0a0e14" />

  <!-- Open Graph (WhatsApp, Facebook, LinkedIn previews) -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="findr — discover places near you" />
  <meta property="og:description"
    content="Find mosques, hospitals, ATMs, eateries and more near you — powered by AI." />
  <meta property="og:url" content="https://findr-self.vercel.app" />
  <meta property="og:image" content="https://findr-self.vercel.app/og-image.png" />

  <!-- Twitter card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="findr — discover places near you" />
  <meta name="twitter:description"
    content="Find mosques, hospitals, ATMs, eateries and more near you — powered by AI." />
  <meta name="twitter:image" content="https://findr-self.vercel.app/og-image.png" />

  <!-- PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="findr" />
</head>

  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
